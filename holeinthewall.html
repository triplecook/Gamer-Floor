<!DOCTYPE html>
<html><head><title>Hole in the Wall</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:monospace;}
#hud{position:fixed;top:15px;left:50%;transform:translateX(-50%);color:#fff;font-size:16px;text-align:center;z-index:100;text-shadow:0 0 8px #0ff;pointer-events:none;}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:100;pointer-events:none;}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,0.7);}
#crosshair::before{width:16px;height:2px;top:-1px;left:-8px;}
#crosshair::after{width:2px;height:16px;top:-8px;left:-1px;}
#controls{position:fixed;top:60px;left:15px;z-index:100;pointer-events:none;font-size:11px;}
.key-row{display:flex;gap:3px;margin:2px 0;justify-content:center;}
.key{background:#222;border:1px solid #555;border-radius:4px;padding:4px 8px;color:#888;min-width:28px;text-align:center;transition:all 0.1s;}
.key.active{background:#0ff;color:#000;border-color:#0ff;box-shadow:0 0 8px #0ff;}
.key.wide{min-width:80px;}
.key-label{color:#666;font-size:9px;margin-top:2px;text-align:center;}
#start-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;color:#fff;}
#start-screen h1{font-size:2.5rem;background:linear-gradient(135deg,#0ff,#f0f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px;}
#start-screen p{color:#aaa;margin-bottom:24px;font-size:13px;max-width:400px;text-align:center;line-height:1.8;}
#start-screen button{background:#222;color:#0ff;border:2px solid #0ff;padding:12px 32px;font-size:16px;font-family:monospace;cursor:pointer;border-radius:8px;}
#start-screen button:hover{background:#0ff;color:#000;}
.back{position:fixed;top:15px;left:15px;background:#222;color:#fff;border:1px solid #555;padding:8px 16px;border-radius:6px;font-family:monospace;cursor:pointer;text-decoration:none;z-index:999;}
.back:hover{background:#444;}
.mute-btn{position:fixed;top:15px;right:15px;background:#222;color:#fff;border:1px solid #555;padding:8px 16px;border-radius:6px;font-family:monospace;cursor:pointer;z-index:9999;}
.mute-btn:hover{background:#444;}
</style>
</head><body>
<a class="back" href="index.html">← Back</a>
<button class="mute-btn" onclick="musicMuted=!musicMuted;this.textContent=musicMuted?'🔇 Music Off':'🔊 Music On'">🔊 Music On</button>
<div id="hud">Score: 0 | ♥♥♥</div>
<div id="crosshair"></div>
<div id="controls">
  <div class="key-row"><div class="key" id="k-w">W</div></div>
  <div class="key-row"><div class="key" id="k-a">A</div><div class="key" id="k-s">S</div><div class="key" id="k-d">D</div></div>
  <div class="key-row"><div class="key wide" id="k-space">SPACE</div></div>
  <div class="key-label" id="action-label">—</div>
</div>
<div id="start-screen"><h1>🧱 HOLE IN THE WALL</h1><p>Run forward and dodge through gaps in the walls!<br>Speed increases over time — how far can you go?<br><br>A/D — Strafe left/right<br>Space — Jump<br>Double-tap Space — Dive (breaks cracked 2x2 blocks!)<br>Mouse — Look left/right</p><button onclick="startGame()">START</button></div>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyD6brDwqXf-WeldlapwZLbAyNe7-1yUT3M",
  authDomain:"gamer-floor.firebaseapp.com",
  databaseURL:"https://gamer-floor-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"gamer-floor",
  storageBucket:"gamer-floor.firebasestorage.app",
  messagingSenderId:"721194925615",
  appId:"1:721194925615:web:9366ce5acc997c85e990da"
});
const db=firebase.database();
function submitScore(name,score){db.ref('leaderboard').push({name,score,time:Date.now()});}
function getLeaderboard(cb){db.ref('leaderboard').orderByChild('score').limitToLast(10).once('value',snap=>{const scores=[];snap.forEach(s=>scores.push(s.val()));scores.reverse();cb(scores);});}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let musicMuted=false;
let audioCtx,musicPlaying=false,lastBeat=0,beatCount=0;
const bpm=128,beatInterval=60/bpm;
function initAudio(){audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playNote(f,t,d,type,vol){if(musicMuted)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=f;g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+d);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+d+0.01);}
function playBeat(t,b){if(musicMuted)return;const k=audioCtx.createOscillator(),kg=audioCtx.createGain();k.type='sine';k.frequency.setValueAtTime(140,t);k.frequency.exponentialRampToValueAtTime(30,t+0.1);kg.gain.setValueAtTime(0.3,t);kg.gain.exponentialRampToValueAtTime(0.001,t+0.15);k.connect(kg);kg.connect(audioCtx.destination);k.start(t);k.stop(t+0.2);if(b%2===1){const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.04,audioCtx.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const n=audioCtx.createBufferSource();n.buffer=buf;const ng=audioCtx.createGain();ng.gain.setValueAtTime(0.1,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.04);n.connect(ng);ng.connect(audioCtx.destination);n.start(t);}const mel=[330,330,392,440,392,330,294,330,349,392,440,523,494,440,392,349];playNote(mel[b%mel.length],t,beatInterval*0.5,'sawtooth',0.05);const bass=[82,82,110,110,98,98,73,73];playNote(bass[b%bass.length],t,beatInterval*0.7,'triangle',0.12);}
function scheduleBeat(){if(!musicPlaying)return;const now=audioCtx.currentTime;while(lastBeat<now+0.2){playBeat(lastBeat,beatCount);lastBeat+=beatInterval;beatCount++;}}

const CONCRETE=[0xCFD5D6,0xE06101,0xA9309F,0x2489C7,0xF1AF15,0x5EA918,0xD5658F,0x3A3B3F,0x7D7D73,0x157788,0x64209C,0x2D2F8F,0x603C20,0x495B24,0x8E2121,0x141519];

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x1a1a2e);
scene.fog=new THREE.Fog(0x1a1a2e,40,90);
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,120);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});

scene.add(new THREE.AmbientLight(0x404060));
const sun=new THREE.DirectionalLight(0xaaccff,0.8);sun.position.set(5,15,10);scene.add(sun);
const runLight=new THREE.PointLight(0x00ffff,0.4,15);scene.add(runLight);

// Ground - long repeating tiles
const groundGroup=new THREE.Group();
for(let i=0;i<30;i++){
  const g=new THREE.Mesh(new THREE.PlaneGeometry(20,20),new THREE.MeshLambertMaterial({color:i%2===0?0x2a2a3a:0x252535}));
  g.rotation.x=-Math.PI/2;g.position.z=-i*20;groundGroup.add(g);
}
scene.add(groundGroup);

// Side walls with laser fences
const wallGroup=new THREE.Group();
const sideMat=new THREE.MeshLambertMaterial({color:0x333344});
const laserMat=new THREE.MeshBasicMaterial({color:0xff0044,transparent:true,opacity:0.6});
for(let i=0;i<40;i++){
  // Left wall
  const lw=new THREE.Mesh(new THREE.BoxGeometry(0.5,6,2),sideMat);
  lw.position.set(-10,3,-i*5);wallGroup.add(lw);
  // Right wall
  const rw=new THREE.Mesh(new THREE.BoxGeometry(0.5,6,2),sideMat);
  rw.position.set(10,3,-i*5);wallGroup.add(rw);
  // Laser beams between pillars
  if(i%2===0){
    for(let ly=1;ly<5;ly+=1.5){
      const laser=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.05,4.5),laserMat);
      laser.position.set(-10,ly,-i*5-1.25);wallGroup.add(laser);
      const laser2=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.05,4.5),laserMat);
      laser2.position.set(10,ly,-i*5-1.25);wallGroup.add(laser2);
    }
  }
}
scene.add(wallGroup);

// First person arm/hand
const armGroup=new THREE.Group();
const armMat=new THREE.MeshLambertMaterial({color:0xddaa77});
const sleeveMat=new THREE.MeshLambertMaterial({color:0x2244aa});
const arm=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.25,0.8),sleeveMat);arm.position.set(0.5,-0.3,0);
const hand=new THREE.Mesh(new THREE.BoxGeometry(0.25,0.2,0.3),armMat);hand.position.set(0.5,-0.3,-0.5);
const fist=new THREE.Mesh(new THREE.BoxGeometry(0.28,0.25,0.2),armMat);fist.position.set(0.5,-0.25,-0.7);
armGroup.add(arm,hand,fist);
camera.add(armGroup);
scene.add(camera);

// Block geometry
const BLK=2;
const blockGeo=new THREE.BoxGeometry(BLK,BLK,BLK);

let gameState='menu',score=0,lives=3,walls=[],yaw=0;
let playerZ=0,playerX=0,playerY=0,velY=0,runSpeed=18;
let diving=false,diveTimer=0,lastSpaceTime=0,spaceCount=0;
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key===' '){e.preventDefault();
    const now=performance.now();
    if(now-lastSpaceTime<500){spaceCount++;}else{spaceCount=1;}
    if(spaceCount>=2&&!diving){diving=true;diveTimer=0.6;spaceCount=0;}
    lastSpaceTime=now;
  }
});
document.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
document.addEventListener('mousemove',e=>{
  if(gameState==='playing'){
    if(document.pointerLockElement){yaw-=e.movementX*0.003;}
    else{yaw=-(e.clientX-window.innerWidth/2)/window.innerWidth*2;}
    yaw=Math.max(-1.2,Math.min(1.2,yaw));
  }
});
renderer.domElement.addEventListener('click',()=>{if(gameState==='playing')renderer.domElement.requestPointerLock();});

const GRID_W=9,GRID_H=5;
function createWall(z){
  const group=new THREE.Group();
  const baseColor=CONCRETE[Math.floor(Math.random()*CONCRETE.length)];
  const gapX=Math.floor(Math.random()*(GRID_W-3));
  const gapY=Math.floor(Math.random()*(GRID_H-3));
  const gap=new Set();
  for(let dx=0;dx<4;dx++)for(let dy=0;dy<4;dy++)gap.add((gapX+dx)+','+(gapY+dy));
  // Cracked 2x2 patch (not in gap, random position)
  let crackX=-1,crackY=-1;
  if(Math.random()<0.3){
    for(let tries=0;tries<10;tries++){
      const cx=Math.floor(Math.random()*(GRID_W-1)),cy=Math.floor(Math.random()*(GRID_H-1));
      if(!gap.has(cx+','+cy)&&!gap.has((cx+1)+','+cy)&&!gap.has(cx+','+(cy+1))&&!gap.has((cx+1)+','+(cy+1))){crackX=cx;crackY=cy;break;}
    }
  }
  const crackSet=new Set();
  if(crackX>=0){for(let dx=0;dx<2;dx++)for(let dy=0;dy<2;dy++)crackSet.add((crackX+dx)+','+(crackY+dy));}
  for(let x=0;x<GRID_W;x++){
    for(let y=0;y<GRID_H;y++){
      if(!gap.has(x+','+y)){
        const mat=new THREE.MeshLambertMaterial({color:baseColor});
        const shade=(Math.sin(x*2.1)+Math.cos(y*3.7))*0.05;
        mat.color.offsetHSL(0,0,shade);
        const block=new THREE.Mesh(blockGeo,mat);
        block.position.set((x-GRID_W/2+0.5)*BLK,y*BLK+BLK/2,0);
        group.add(block);
        // Crack rips only on cracked 2x2 patch
        if(crackSet.has(x+','+y)){
          const crackMat=new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:0.6});
          const rip1=new THREE.Mesh(new THREE.PlaneGeometry(BLK*0.7,BLK*0.08),crackMat);
          rip1.position.set((x-GRID_W/2+0.5)*BLK,y*BLK+BLK/2,BLK/2+0.02);rip1.rotation.z=0.7;group.add(rip1);
          const rip2=new THREE.Mesh(new THREE.PlaneGeometry(BLK*0.5,BLK*0.06),crackMat);
          rip2.position.set((x-GRID_W/2+0.5)*BLK+0.2,y*BLK+BLK/2-0.3,BLK/2+0.02);rip2.rotation.z=-0.4;group.add(rip2);
          const rip3=new THREE.Mesh(new THREE.PlaneGeometry(BLK*0.3,BLK*0.05),crackMat);
          rip3.position.set((x-GRID_W/2+0.5)*BLK-0.3,y*BLK+BLK/2+0.2,BLK/2+0.02);rip3.rotation.z=1.2;group.add(rip3);
        }
      }
    }
  }
  group.position.z=z;
  group.userData={gapX,gapY,passed:false,crackX,crackY,crackSet};
  scene.add(group);return group;
}

function checkHit(wall){
  const w=wall.userData;
  const px=Math.round(playerX/BLK+GRID_W/2-0.5);
  const py=Math.round(playerY/BLK);
  for(let dy=0;dy<2;dy++){
    const isGap=(px>=w.gapX&&px<w.gapX+4&&(py+dy)>=w.gapY&&(py+dy)<w.gapY+4);
    const isCrack=w.crackSet&&w.crackSet.has(px+','+(py+dy));
    if(!isGap&&px>=0&&px<GRID_W){
      if(isCrack&&diving)return 'crack';
      if(!isCrack||!diving)return 'hit';
    }
  }
  return false;
}

function wallSpacing(){return Math.max(14,22-runSpeed*0.2);}
function spawnWalls(){for(let i=0;i<6;i++)walls.push(createWall(playerZ-30-i*wallSpacing()));}

function startGame(){
  document.getElementById('start-screen').style.display='none';
  renderer.domElement.requestPointerLock();
  if(!audioCtx)initAudio();musicPlaying=true;lastBeat=audioCtx.currentTime;beatCount=0;
  gameState='playing';score=0;lives=3;yaw=0;
  walls.forEach(w=>scene.remove(w));walls=[];
  playerZ=0;playerX=0;playerY=0;velY=0;runSpeed=14;diving=false;
  spawnWalls();updateHUD();
}
function updateHUD(){document.getElementById('hud').innerHTML='Score: '+score+' | '+'♥'.repeat(lives)+'♡'.repeat(3-lives);}
function showEnd(){
  document.exitPointerLock();musicPlaying=false;
  const s=document.getElementById('start-screen');s.style.display='flex';
  s.innerHTML='<h1>GAME OVER</h1><p>Score: '+score+'</p><input id="pname" placeholder="Your name" maxlength="12" style="padding:8px 16px;font-size:14px;font-family:monospace;border:2px solid #0ff;background:#111;color:#fff;border-radius:6px;margin:10px;width:200px;text-align:center"><button onclick="submitAndShow()">SUBMIT SCORE</button>';
}
function submitAndShow(){
  const name=(document.getElementById('pname').value||'Anon').trim().slice(0,12);
  submitScore(name,score);
  const s=document.getElementById('start-screen');
  s.innerHTML='<h1>GAME OVER</h1><p>Score: '+score+'</p><h3 style="color:#0ff;margin:10px 0">🌐 GLOBAL LEADERBOARD</h3><p id="lb-list">Loading...</p><button onclick="startGame()" style="margin-top:16px">PLAY AGAIN</button>';
  getLeaderboard(scores=>{
    const html=scores.map((e,i)=>'<span style="color:'+(i===0?'#ff0':i<3?'#0ff':'#aaa')+'">'+(i+1)+'. '+e.name+' — '+e.score+'</span>').join('<br>');
    document.getElementById('lb-list').innerHTML=html||'No scores yet';
  });
}

function updateControls(){
  const setKey=(id,active)=>{const el=document.getElementById(id);if(el)el.className=active?'key active':'key';};
  setKey('k-w',keys['w']||keys['arrowup']);
  setKey('k-a',keys['a']||keys['arrowleft']);
  setKey('k-s',keys['s']||keys['arrowdown']);
  setKey('k-d',keys['d']||keys['arrowright']);
  const sp=document.getElementById('k-space');if(sp)sp.className=keys[' ']?'key wide active':'key wide';
  const label=document.getElementById('action-label');
  if(diving)label.textContent='⚡ DIVING';
  else if(keys[' '])label.textContent='↑ Jumping';
  else if(keys['a']||keys['arrowleft'])label.textContent='← Strafe Left';
  else if(keys['d']||keys['arrowright'])label.textContent='→ Strafe Right';
  else label.textContent='— Running';
}

let prev=performance.now();
function animate(){
  requestAnimationFrame(animate);
  const now=performance.now(),dt=Math.min((now-prev)/1000,0.05);prev=now;
  if(musicPlaying)scheduleBeat();
  if(gameState!=='playing'){renderer.render(scene,camera);return;}
  updateControls();

  // Movement - auto speed, no W/S
  playerZ-=runSpeed*dt;
  const strafe=12*dt;
  if(keys['a']||keys['arrowleft'])playerX-=strafe;
  if(keys['d']||keys['arrowright'])playerX+=strafe;
  playerX=Math.max(-8,Math.min(8,playerX));
  // Jump
  if(keys[' ']&&playerY===0&&!diving)velY=12;
  velY-=30*dt;playerY+=velY*dt;
  if(playerY<=0){playerY=0;velY=0;}
  // Dive
  if(diving){diveTimer-=dt;if(diveTimer<=0)diving=false;playerZ-=25*dt;}

  // Camera + arm
  camera.position.set(playerX,2.2+playerY,playerZ+2);
  camera.rotation.set(diving?-0.3:0,yaw,0);
  armGroup.position.z=diving?-1.2:-0.6;
  arm.rotation.x=diving?-0.5:Math.sin(now*0.006)*0.1;
  runLight.position.set(playerX,2,playerZ-3);

  // Move side walls with player
  wallGroup.position.z=Math.floor(playerZ/5)*5;
  groundGroup.position.z=Math.floor(playerZ/20)*20;

  // Walls
  for(let i=walls.length-1;i>=0;i--){
    const w=walls[i];
    if(!w.userData.passed&&w.position.z>playerZ-1&&w.position.z<playerZ+2){
      w.userData.passed=true;
      const result=checkHit(w);
      if(result==='crack'){
        score+=25;
        w.children.forEach(c=>{if(c.material)c.material=new THREE.MeshBasicMaterial({color:0xff8800,transparent:true,opacity:0.5});});
        setTimeout(()=>scene.remove(w),300);
      }else if(result==='hit'){
        lives--;scene.background.setHex(0xff1111);setTimeout(()=>scene.background.setHex(0x1a1a2e),200);
        if(lives<=0){gameState='over';showEnd();return;}
      }else{score+=10;}
      updateHUD();
    }
    if(w.position.z>playerZ+25){scene.remove(w);walls.splice(i,1);
      const far=walls.reduce((a,ww)=>Math.min(a,ww.position.z),playerZ);
      walls.push(createWall(far-wallSpacing()));
    }
  }
  // Progressive speed (capped at 30)
  runSpeed=Math.min(30,runSpeed+0.15*dt);
  renderer.render(scene,camera);
}
animate();
</script>
</body></html>
