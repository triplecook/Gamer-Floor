<!DOCTYPE html>
<html><head><title>Block Rivals</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:monospace;}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:100;pointer-events:none;color:#fff;font-size:24px;text-shadow:0 0 2px #000;}
#hud{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;pointer-events:none;color:#fff;display:flex;gap:30px;align-items:center;font-size:14px;text-shadow:0 0 4px #000;}
#hud .hp-bar{width:200px;height:14px;background:#333;border:1px solid #666;border-radius:3px;}
#hud .hp-fill{height:100%;background:#4f4;border-radius:2px;transition:width 0.2s;}
#hud .ammo{color:#ff0;}
#killfeed{position:fixed;top:60px;right:20px;z-index:100;pointer-events:none;color:#fff;font-size:12px;text-align:right;}
#killfeed div{margin:4px 0;opacity:0.9;}
#scoreboard{position:fixed;top:15px;left:50%;transform:translateX(-50%);z-index:100;pointer-events:none;color:#fff;font-size:18px;text-shadow:0 0 6px #000;}
#start-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;color:#fff;}
#start-screen h1{font-size:2.5rem;color:#f80;margin-bottom:16px;}
#start-screen p{color:#aaa;margin-bottom:24px;font-size:13px;max-width:400px;text-align:center;line-height:1.8;}
#start-screen button{background:#222;color:#f80;border:2px solid #f80;padding:12px 32px;font-size:16px;font-family:monospace;cursor:pointer;border-radius:8px;}
#start-screen button:hover{background:#f80;color:#000;}
.back{position:fixed;top:15px;left:15px;background:#222;color:#fff;border:1px solid #555;padding:8px 16px;border-radius:6px;font-family:monospace;cursor:pointer;text-decoration:none;z-index:999;}
.back:hover{background:#444;}
.mute-btn{position:fixed;top:15px;right:15px;background:#222;color:#fff;border:1px solid #555;padding:8px 16px;border-radius:6px;font-family:monospace;cursor:pointer;z-index:9999;}
.mute-btn:hover{background:#444;}
#dmg-flash{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:90;background:rgba(255,0,0,0);transition:background 0.1s;}
</style>
</head><body>
<a class="back" href="index.html">← Back</a>
<button class="mute-btn" id="mute-btn" onclick="const m=document.getElementById('music');m.muted=!m.muted;localStorage.setItem('muted',m.muted?'1':'0');this.textContent=m.muted?'🔇 Music Off':'🔊 Music On'">🔊 Music On</button>
<audio id="music" src="music-home.mp3" loop></audio>
<div id="crosshair">+</div>
<div id="hud"><div class="hp-bar"><div class="hp-fill" id="hp-fill"></div></div><span id="hp-text">100</span><span class="ammo" id="ammo-text">30/30</span></div>
<div id="scoreboard">YOU: 0 | BOTS: 0</div>
<div id="killfeed"></div>
<div id="dmg-flash"></div>
<div id="start-screen"><h1>🔫 BLOCK RIVALS</h1><p>Fast-paced FPS against bots!<br><br>WASD — Move<br>Mouse — Aim<br>Click — Shoot<br>R — Reload<br>Space — Jump<br>Shift — Sprint</p><button onclick="startGame()">PLAY</button></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Audio init
const musicEl=document.getElementById('music');
if(localStorage.getItem('muted')==='1'){musicEl.muted=true;document.getElementById('mute-btn').textContent='🔇 Music Off';}
document.addEventListener('click',()=>{musicEl.volume=0.25;musicEl.play();},{once:true});

// Sound effects
const actx=new(window.AudioContext||window.webkitAudioContext)();
function playSound(freq,dur,type='square',vol=0.1){
  if(localStorage.getItem('muted')==='1')return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+dur);
}
function shootSound(){playSound(800,0.05,'sawtooth',0.15);playSound(200,0.1,'square',0.1);}
function hitSound(){playSound(300,0.1,'sine',0.2);}
function killSound(){playSound(600,0.15,'square',0.12);playSound(900,0.1,'sine',0.1);}

// Three.js setup
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87CEEB);
scene.fog=new THREE.Fog(0x87CEEB,60,120);
const camera=new THREE.PerspectiveCamera(80,window.innerWidth/window.innerHeight,0.1,150);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
document.body.appendChild(renderer.domElement);
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});

// Lighting
scene.add(new THREE.AmbientLight(0x606080,0.6));
const sun=new THREE.DirectionalLight(0xffffff,0.9);sun.position.set(20,40,20);sun.castShadow=true;scene.add(sun);

// Map - blocky arena
const mapObjs=[];
function box(x,y,z,w,h,d,color){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshLambertMaterial({color}));
  m.position.set(x,y,z);m.castShadow=true;m.receiveShadow=true;scene.add(m);mapObjs.push(m);return m;
}
// Floor
const floor=new THREE.Mesh(new THREE.PlaneGeometry(80,80),new THREE.MeshLambertMaterial({color:0x556655}));
floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);
// Walls (arena border)
box(0,4,40,80,8,2,0x887766);box(0,4,-40,80,8,2,0x887766);
box(40,4,0,2,8,80,0x887766);box(-40,4,0,2,8,80,0x887766);
// Cover objects
box(10,1.5,10,4,3,4,0x998877);box(-10,1.5,-10,4,3,4,0x998877);
box(15,1.5,-15,3,3,6,0x889988);box(-15,1.5,15,6,3,3,0x889988);
box(0,1.5,20,8,3,2,0x997766);box(0,1.5,-20,8,3,2,0x997766);
box(25,1.5,0,2,3,8,0x778899);box(-25,1.5,0,2,3,8,0x778899);
// Crates
box(5,1,0,2,2,2,0xaa8855);box(-5,1,-5,2,2,2,0xaa8855);
box(20,1,20,2,2,2,0xaa8855);box(-20,1,-20,2,2,2,0xaa8855);
// Ramps
const ramp=new THREE.Mesh(new THREE.BoxGeometry(4,0.5,6),new THREE.MeshLambertMaterial({color:0x889977}));
ramp.position.set(0,1,0);ramp.rotation.x=-0.3;scene.add(ramp);mapObjs.push(ramp);

// Player state
const player={x:0,y:1.6,z:30,vx:0,vy:0,vz:0,yaw:0,pitch:0,hp:100,maxHp:100,ammo:30,maxAmmo:30,reloading:false,reloadTimer:0,dead:false,respawnTimer:0,score:0,sprinting:false};
const keys={};
document.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key===' ')e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});

// Mouse look
document.addEventListener('mousemove',e=>{
  if(document.pointerLockElement){
    player.yaw-=e.movementX*0.002;
    player.pitch-=e.movementY*0.002;
    player.pitch=Math.max(-Math.PI/2+0.1,Math.min(Math.PI/2-0.1,player.pitch));
  }
});
renderer.domElement.addEventListener('click',()=>{if(gameState==='playing')renderer.domElement.requestPointerLock();});

// Gun model (attached to camera)
const gunGroup=new THREE.Group();
const gunBody=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.12,0.6),new THREE.MeshLambertMaterial({color:0x333333}));
const gunBarrel=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.06,0.3),new THREE.MeshLambertMaterial({color:0x222222}));
gunBarrel.position.z=-0.4;
const gunGrip=new THREE.Mesh(new THREE.BoxGeometry(0.08,0.2,0.12),new THREE.MeshLambertMaterial({color:0x553311}));
gunGrip.position.set(0,-0.12,0.1);
gunGroup.add(gunBody,gunBarrel,gunGrip);
gunGroup.position.set(0.3,-0.25,-0.5);
camera.add(gunGroup);
scene.add(camera);

// Bot class
const COLORS=[0xe74c3c,0x3498db,0x2ecc71,0xf39c12,0x9b59b6];
let bots=[];
let botScore=0;

function createBot(x,z){
  const color=COLORS[Math.floor(Math.random()*COLORS.length)];
  const group=new THREE.Group();
  // Body
  const body=new THREE.Mesh(new THREE.BoxGeometry(0.8,1.2,0.6),new THREE.MeshLambertMaterial({color}));
  body.position.y=1.4;group.add(body);
  // Head
  const head=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.6,0.6),new THREE.MeshLambertMaterial({color:0xffcc88}));
  head.position.y=2.3;group.add(head);
  // Legs
  const legMat=new THREE.MeshLambertMaterial({color:0x333344});
  const l1=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.8,0.3),legMat);l1.position.set(-0.2,0.4,0);group.add(l1);
  const l2=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.8,0.3),legMat);l2.position.set(0.2,0.4,0);group.add(l2);
  // Gun
  const bGun=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.1,0.5),new THREE.MeshLambertMaterial({color:0x222222}));
  bGun.position.set(0.4,1.3,-0.3);group.add(bGun);
  group.position.set(x,0,z);
  scene.add(group);
  return{group,x,z,y:0,vx:0,vz:0,hp:100,maxHp:100,dead:false,respawnTimer:0,
    target:null,shootTimer:0,moveTimer:0,moveDir:{x:0,z:0},color,
    lastSeen:0,state:'patrol'};
}

function spawnBots(){
  const spawns=[[-20,0,-20],[20,0,20],[-20,0,20],[20,0,-20],[0,0,-25]];
  spawns.forEach(s=>bots.push(createBot(s[0],s[2])));
}

// Collision detection
function checkWallCollision(x,z,radius){
  for(const obj of mapObjs){
    const b=new THREE.Box3().setFromObject(obj);
    const cx=Math.max(b.min.x,Math.min(x,b.max.x));
    const cz=Math.max(b.min.z,Math.min(z,b.max.z));
    const dx=x-cx,dz=z-cz;
    if(dx*dx+dz*dz<radius*radius)return true;
  }
  return false;
}

// Raycasting for shooting
const raycaster=new THREE.Raycaster();
function shoot(){
  if(player.ammo<=0||player.reloading||player.dead)return;
  player.ammo--;shootSound();
  updateHUD();
  // Gun recoil
  gunGroup.rotation.x=-0.15;setTimeout(()=>gunGroup.rotation.x=0,80);
  // Muzzle flash
  const flash=new THREE.Mesh(new THREE.SphereGeometry(0.05),new THREE.MeshBasicMaterial({color:0xffff00}));
  flash.position.copy(gunGroup.position);flash.position.z-=0.7;
  camera.add(flash);setTimeout(()=>camera.remove(flash),50);
  // Raycast from camera center
  raycaster.setFromCamera({x:0,y:0},camera);
  const botMeshes=bots.filter(b=>!b.dead).map(b=>b.group.children).flat();
  const hits=raycaster.intersectObjects(botMeshes);
  if(hits.length>0){
    const hit=hits[0];
    // Find which bot was hit
    for(const bot of bots){
      if(bot.dead)continue;
      if(bot.group.children.includes(hit.object)){
        const dmg=hit.object.position.y>2?40:20; // headshot vs body
        bot.hp-=dmg;hitSound();
        if(bot.hp<=0){
          bot.dead=true;bot.respawnTimer=5;
          bot.group.visible=false;
          player.score++;killSound();
          addKill('You',bot.color);
          updateScoreboard();
        }
        break;
      }
    }
  }
  if(player.ammo<=0)reload();
}

function reload(){
  if(player.reloading||player.ammo===player.maxAmmo)return;
  player.reloading=true;player.reloadTimer=2;
}

// Bot AI
function updateBot(bot,dt){
  if(bot.dead){bot.respawnTimer-=dt;if(bot.respawnTimer<=0){respawnBot(bot);}return;}
  // Check line of sight to player
  const dx=player.x-bot.x,dz=player.z-bot.z;
  const dist=Math.sqrt(dx*dx+dz*dz);
  let canSee=false;
  if(dist<40&&!player.dead){
    const dir=new THREE.Vector3(dx,0,dz).normalize();
    const rc=new THREE.Raycaster(new THREE.Vector3(bot.x,1.5,bot.z),dir,0,dist);
    const hits=rc.intersectObjects(mapObjs);
    canSee=hits.length===0||hits[0].distance>dist-1;
  }
  if(canSee){
    bot.state='attack';bot.lastSeen=Date.now();
    // Face player
    bot.group.rotation.y=Math.atan2(dx,dz);
    // Shoot
    bot.shootTimer-=dt;
    if(bot.shootTimer<=0&&dist<35){
      bot.shootTimer=0.8+Math.random()*0.5;
      // Bot accuracy (worse at distance)
      const accuracy=Math.max(0.3,1-dist/50);
      if(Math.random()<accuracy){
        player.hp-=8+Math.floor(Math.random()*7);
        document.getElementById('dmg-flash').style.background='rgba(255,0,0,0.3)';
        setTimeout(()=>document.getElementById('dmg-flash').style.background='rgba(255,0,0,0)',150);
        if(player.hp<=0){playerDie();}
        updateHUD();
      }
    }
    // Strafe
    const strafe=Math.sin(Date.now()*0.002+bot.x)*3*dt;
    const perpX=-dz/dist,perpZ=dx/dist;
    const nx=bot.x+perpX*strafe,nz=bot.z+perpZ*strafe;
    if(!checkWallCollision(nx,nz,0.5)&&Math.abs(nx)<38&&Math.abs(nz)<38){bot.x=nx;bot.z=nz;}
  }else{
    bot.state='patrol';
    // Patrol movement
    bot.moveTimer-=dt;
    if(bot.moveTimer<=0){bot.moveTimer=2+Math.random()*2;bot.moveDir={x:(Math.random()-0.5)*2,z:(Math.random()-0.5)*2};}
    const spd=4*dt;
    const nx=bot.x+bot.moveDir.x*spd,nz=bot.z+bot.moveDir.z*spd;
    if(!checkWallCollision(nx,nz,0.5)&&Math.abs(nx)<38&&Math.abs(nz)<38){bot.x=nx;bot.z=nz;}
    bot.group.rotation.y=Math.atan2(bot.moveDir.x,bot.moveDir.z);
  }
  bot.group.position.set(bot.x,bot.y,bot.z);
  // Leg animation
  const walk=Math.sin(Date.now()*0.01)*0.2;
  bot.group.children[2].position.y=0.4+walk*0.1;
  bot.group.children[3].position.y=0.4-walk*0.1;
}

function respawnBot(bot){
  bot.dead=false;bot.hp=bot.maxHp;bot.group.visible=true;
  const angle=Math.random()*Math.PI*2;
  bot.x=Math.cos(angle)*25;bot.z=Math.sin(angle)*25;
  bot.group.position.set(bot.x,0,bot.z);
}

function playerDie(){
  player.dead=true;player.respawnTimer=3;
  botScore++;updateScoreboard();
  addKill('Bot','#f44');
}

function respawnPlayer(){
  player.dead=false;player.hp=player.maxHp;player.ammo=player.maxAmmo;
  player.x=0;player.z=30;player.y=1.6;
  player.reloading=false;updateHUD();
}

// Game state
let gameState='menu';
function startGame(){
  document.getElementById('start-screen').style.display='none';
  renderer.domElement.requestPointerLock();
  gameState='playing';player.score=0;botScore=0;
  player.hp=player.maxHp;player.ammo=player.maxAmmo;player.dead=false;
  bots.forEach(b=>{scene.remove(b.group);});bots=[];
  spawnBots();updateHUD();updateScoreboard();
}

// Shooting on click
document.addEventListener('mousedown',e=>{if(e.button===0&&gameState==='playing')shoot();});

// HUD updates
function updateHUD(){
  const pct=Math.max(0,player.hp)/player.maxHp*100;
  document.getElementById('hp-fill').style.width=pct+'%';
  document.getElementById('hp-fill').style.background=pct>50?'#4f4':pct>25?'#ff0':'#f44';
  document.getElementById('hp-text').textContent=Math.max(0,player.hp);
  document.getElementById('ammo-text').textContent=player.reloading?'Reloading...':player.ammo+'/'+player.maxAmmo;
}
function updateScoreboard(){document.getElementById('scoreboard').textContent='YOU: '+player.score+' | BOTS: '+botScore;}
function addKill(who,color){
  const el=document.getElementById('killfeed');
  const d=document.createElement('div');
  d.innerHTML='<span style="color:'+(typeof color==='number'?'#'+color.toString(16):color)+'">'+who+'</span> got a kill';
  el.prepend(d);if(el.children.length>5)el.removeChild(el.lastChild);
  setTimeout(()=>d.remove(),4000);
}

// Main loop
let prev=performance.now();
function animate(){
  requestAnimationFrame(animate);
  const now=performance.now(),dt=Math.min((now-prev)/1000,0.05);prev=now;
  if(gameState!=='playing'){renderer.render(scene,camera);return;}

  // Player death/respawn
  if(player.dead){player.respawnTimer-=dt;if(player.respawnTimer<=0)respawnPlayer();renderer.render(scene,camera);return;}

  // Reload
  if(player.reloading){player.reloadTimer-=dt;if(player.reloadTimer<=0){player.reloading=false;player.ammo=player.maxAmmo;updateHUD();}}

  // Movement
  const spd=(player.sprinting?10:6)*dt;
  player.sprinting=keys['shift'];
  let mx=0,mz=0;
  if(keys['w'])mz-=1;if(keys['s'])mz+=1;
  if(keys['a'])mx-=1;if(keys['d'])mx+=1;
  if(mx||mz){
    const len=Math.sqrt(mx*mx+mz*mz);mx/=len;mz/=len;
    const sin=Math.sin(player.yaw),cos=Math.cos(player.yaw);
    const fx=mx*cos-mz*sin,fz=mx*sin+mz*cos;
    const nx=player.x+fx*spd,nz=player.z+fz*spd;
    if(!checkWallCollision(nx,player.z,0.4)&&Math.abs(nx)<39)player.x=nx;
    if(!checkWallCollision(player.x,nz,0.4)&&Math.abs(nz)<39)player.z=nz;
  }
  // Jump
  if(keys[' ']&&player.y<=1.6)player.vy=8;
  player.vy-=20*dt;player.y+=player.vy*dt;
  if(player.y<1.6){player.y=1.6;player.vy=0;}
  // Reload key
  if(keys['r'])reload();

  // Camera
  camera.position.set(player.x,player.y,player.z);
  camera.rotation.order='YXZ';
  camera.rotation.y=player.yaw;
  camera.rotation.x=player.pitch;

  // Gun bob
  const bobAmt=(mx||mz)?0.03:0.01;
  gunGroup.position.y=-0.25+Math.sin(now*0.008)*bobAmt;
  gunGroup.position.x=0.3+Math.cos(now*0.004)*bobAmt*0.5;

  // Update bots
  bots.forEach(b=>updateBot(b,dt));

  renderer.render(scene,camera);
}
animate();
</script>
</body></html>
